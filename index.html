<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý chia tiền</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .form-check-inline {
            margin-right: 10px;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container py-4">
        <div class="row">
            <div class="col-12 col-md-3">
                <a href="history.html" class="btn btn-outline-secondary mb-3">📜 Xem lịch sử tính tiền</a>
            </div>
        </div>
        <div class="row">
            <div class="col-12 col-md-6">
                <h2 class="mb-3">👤 Danh sách các bro</h2>
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <input type="text" id="newPerson" class="form-control" placeholder="Nhập tên người mới">
                            <button class="btn btn-primary" id="addPerson">Thêm người</button>
                        </div>
                        <ul class="list-group" id="personList"></ul>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6">
                <h2 class="mb-3">💸 Khoản chi</h2>
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Tiêu đề khoản chi</label>
                            <input type="text" class="form-control" id="expenseTitle" placeholder="VD: Tiền điện, nước...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Người chi</label>
                            <select class="form-select" id="payerSelect"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số tiền (VND)</label>
                            <input type="number" class="form-control" id="amount">
                        </div>
                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <label class="form-label mb-0">Người cùng chia</label>
                                <button class="btn btn-sm btn-outline-primary" type="button" id="checkAllBtn">Chọn tất cả</button>
                            </div>
                            <div id="sharedWithCheckboxes" class="form-check"></div>
                        </div>
                        <button class="btn btn-success" id="addExpense">Thêm khoản chi</button>
                    </div>
                </div>
            </div>
        </div>
        <h2 class="mb-3">📜 Danh sách khoản chi</h2>
        <div class="card mb-4">
            <div class="card-body" id="expenseList"></div>
        </div>
        <button class="btn btn-primary mb-3" id="calculate">Tính chia</button>
        <div id="result" class="card" style="display:none;">
            <div class="card-body"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script>
        // Khởi tạo Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDxRarjAaLRVTkMSnaUdv1NsoZam8b3rlc",
            authDomain: "money-7965b.firebaseapp.com",
            projectId: "money-7965b",
            storageBucket: "money-7965b.firebasestorage.app",
            messagingSenderId: "117194635590",
            appId: "1:117194635590:web:6d911955d6257e16760d47",
            measurementId: "G-Y676HMF04H"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>


    <!-- Bootstrap JS (optional for components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).on('click', '#checkAllBtn', function () {
            const checkboxes = $('#sharedWithCheckboxes input[type="checkbox"]');
            const allChecked = checkboxes.length === checkboxes.filter(':checked').length;
            checkboxes.prop('checked', !allChecked);
            $(this).text(allChecked ? 'Chọn tất cả' : 'Bỏ chọn tất cả');
        });
        const defaultPeople = ["Đức", "Huy", "Dân", "Tú", "Châm", "Văn"];
        const peopleDocRef = db.collection("appState").doc("people");
        let people = [];
        let expenses = [];
        const windows1252ByteMap = {
            '€': 0x80, '‚': 0x82, 'ƒ': 0x83, '„': 0x84, '…': 0x85,
            '†': 0x86, '‡': 0x87, 'ˆ': 0x88, '‰': 0x89, 'Š': 0x8a,
            '‹': 0x8b, 'Œ': 0x8c, 'Ž': 0x8e, '‘': 0x91, '’': 0x92,
            '“': 0x93, '”': 0x94, '•': 0x95, '–': 0x96, '—': 0x97,
            '˜': 0x98, '™': 0x99, 'š': 0x9a, '›': 0x9b, 'œ': 0x9c,
            'ž': 0x9e, 'Ÿ': 0x9f
        };

        function hasMojibakeMarker(text) {
            return /[\u00c3\u00c4\u00c2\u00c6\u00e1\u00e0\u00e2\u00f0]/.test(text);
        }

        function fixMojibakeText(text) {
            if (typeof text !== 'string' || !hasMojibakeMarker(text)) {
                return text;
            }

            try {
                const bytes = Uint8Array.from([...text].map(char => {
                    if (windows1252ByteMap[char]) {
                        return windows1252ByteMap[char];
                    }

                    const charCode = char.charCodeAt(0);
                    if (charCode <= 0xff) {
                        return charCode;
                    }

                    throw new Error('Unsupported mojibake character.');
                }));
                const decodedText = new TextDecoder('utf-8', { fatal: true }).decode(bytes);
                return decodedText.includes('�') ? text : decodedText;
            } catch (error) {
                return text;
            }
        }

        function normalizePeopleNames(personList) {
            return personList.map(fixMojibakeText);
        }

        function savePeople() {
            return peopleDocRef.set({
                people: people,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true })
            .catch((error) => {
                console.error("Error saving people:", error);
                alert("Không thể lưu danh sách bro lên Firestore. Vui lòng thử lại.");
            });
        }

        function loadPeople() {
            peopleDocRef.get()
                .then((doc) => {
                    const savedPeople = doc.exists ? doc.data().people : null;
                    people = Array.isArray(savedPeople) ? normalizePeopleNames(savedPeople) : [...defaultPeople];
                    renderPeople();

                    if (!doc.exists || JSON.stringify(savedPeople) !== JSON.stringify(people)) {
                        savePeople();
                    }
                })
                .catch((error) => {
                    console.error("Error loading people:", error);
                    people = [...defaultPeople];
                    renderPeople();
                });
        }

        function renderPeople() {
            $('#payerSelect').html(people.map(p => `<option value="${p}">${p}</option>`));
            $('#sharedWithCheckboxes').html(people.map(p => `
                    <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" value="${p}" id="share-${p}">
                    <label class="form-check-label" for="share-${p}">${p}</label>
                    </div>
                `).join(''));

            $('#personList').html(people.map(p => `
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                    <span>${p}</span>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary editPerson" data-name="${p}">✏️</button>
                        <button class="btn btn-sm btn-outline-danger deletePerson" data-name="${p}">❌</button>
                    </div>
                    </li>
                `).join(''));
        }

        $('#addPerson').on('click', function () {
            const name = $('#newPerson').val().trim();
            if (name && !people.includes(name)) {
                people.push(name);
                $('#newPerson').val('');
                renderPeople();
                savePeople();
            }
        });

        $('#personList').on('click', '.deletePerson', function () {
            const name = $(this).data('name');
            if (confirm(`Xóa ${name}?`)) {
                people = people.filter(p => p !== name);
                expenses = expenses.filter(e => e.payer !== name && !e.sharedWith.includes(name));
                renderPeople();
                renderExpenses();
                savePeople();
            }
        });

        $('#personList').on('click', '.editPerson', function () {
            const oldName = $(this).data('name');
            const newName = prompt("Sửa tên người dùng:", oldName);
            if (newName && newName.trim() !== "" && !people.includes(newName.trim())) {
                const trimmedName = newName.trim();
                people = people.map(p => (p === oldName ? trimmedName : p));
                expenses = expenses.map(e => ({
                    title: e.title,
                    payer: e.payer === oldName ? trimmedName : e.payer,
                    amount: e.amount,
                    sharedWith: e.sharedWith.map(p => p === oldName ? trimmedName : p)
                }));
                renderPeople();
                renderExpenses();
                savePeople();
            } else if (newName && people.includes(newName.trim())) {
                alert("Tên đã tồn tại!");
            }
        });

        $('#addExpense').on('click', function () {
            const title = $('#expenseTitle').val().trim();
            const payer = $('#payerSelect').val();
            const amount = parseFloat($('#amount').val()) || 0;
            const sharedWith = $('#sharedWithCheckboxes input:checked').map(function () {
                return $(this).val();
            }).get();

            if (title && payer && amount > 0 && sharedWith.length > 0) {
                expenses.push({ title, payer, amount, sharedWith });
                $('#expenseTitle').val('');
                $('#amount').val('');
                $('#sharedWithCheckboxes input').prop('checked', false);
                renderExpenses();
            } else {
                alert("Vui lòng nhập đầy đủ thông tin.");
            }
        });

        function renderExpenses() {
            $('#expenseList').html(expenses.map((e, i) => `
                    <div class="mb-2 border-bottom pb-2">
                    <strong>${e.title}</strong>: ${e.payer} chi <strong>${e.amount.toLocaleString()} VND</strong> cho [${e.sharedWith.join(', ')}]
                    <button class="btn btn-sm btn-outline-danger float-end deleteExpense" data-index="${i}">❌</button>
                    </div>
                `).join(''));
        }

        $('#expenseList').on('click', '.deleteExpense', function () {
            const i = $(this).data('index');
            expenses.splice(i, 1);
            renderExpenses();
        });

        $('#calculate').on('click', function () {
            const paid = {}, owed = {};
            const allPeople = [...new Set(people)];
            expenses.forEach(e => {
                paid[e.payer] = (paid[e.payer] || 0) + e.amount;
                const share = e.amount / e.sharedWith.length;
                e.sharedWith.forEach(p => {
                    owed[p] = (owed[p] || 0) + share;
                });
            });

            let result = `<h5 class="mb-3">Chi tiết từng khoản</h5>`;
            expenses.forEach(e => {
                const share = Math.round(e.amount / e.sharedWith.length);
                result += `<p><strong>${e.title}</strong>: ${e.payer} chi ${e.amount.toLocaleString()} VND cho ${e.sharedWith.length} người (${e.sharedWith.join(', ')}), mỗi người trả ${share.toLocaleString()} VND</p>`;
            });

            result += `<h5 class="mt-4">Tổng kết</h5><table class="table table-bordered mt-2">
                            <thead><tr><th>Người</th><th>Đã chi</th><th>Phải trả</th><th>Chênh lệch</th></tr></thead><tbody>`;

            allPeople.forEach(p => {
                const chi = Math.round(paid[p] || 0);
                const no = Math.round(owed[p] || 0);
                const diff = chi - no;
                let msg = diff === 0 ? "0" : (diff > 0 ? `Nhận lại ${diff.toLocaleString()} VND` : `Trả thêm ${Math.abs(diff).toLocaleString()} VND`);
                result += `<tr><td>${p}</td><td>${chi.toLocaleString()}</td><td>${no.toLocaleString()}</td><td>${msg}</td></tr>`;
            });

            result += `</tbody></table>`;
            $('#result .card-body').html(result);
            $('#result').show();

            // save to firestore
            const now = new Date().toISOString();
            db.collection("chiaTienResults").add({
                timestamp: now,
                people: people,
                expenses: expenses,
                summaryHTML: $('#result .card-body').html()
            })
            .then(() => {
                console.log("Saved!");
            })
            .catch((error) => {
                console.error("Error:", error);
            });
        });

        // Load saved people, falling back to sample data on first use.
        loadPeople();
    </script>
</body>

</html>
