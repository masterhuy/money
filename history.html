<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử chia tiền</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap + Firebase -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>
<body class="bg-light">
    <div class="container py-4">
        <a href="index.html" class="btn btn-outline-secondary mb-3">🔙 Quay lại trang tính tiền</a>
        <h2 class="mb-4">🕘 Lịch sử tính tiền</h2>

        <!-- Bộ lọc tháng/năm -->
        <div class="mb-4">
            <label class="form-label">📅 Lọc theo tháng/năm:</label>
            <div class="d-flex flex-wrap gap-2">
                <select id="filterYear" class="form-select" style="max-width: 160px;">
                    <option value="">Tất cả năm</option>
                </select>
                <select id="filterMonth" class="form-select" style="max-width: 160px;">
                    <option value="">Tất cả tháng</option>
                    <option value="01">Tháng 1</option>
                    <option value="02">Tháng 2</option>
                    <option value="03">Tháng 3</option>
                    <option value="04">Tháng 4</option>
                    <option value="05">Tháng 5</option>
                    <option value="06">Tháng 6</option>
                    <option value="07">Tháng 7</option>
                    <option value="08">Tháng 8</option>
                    <option value="09">Tháng 9</option>
                    <option value="10">Tháng 10</option>
                    <option value="11">Tháng 11</option>
                    <option value="12">Tháng 12</option>
                </select>
            </div>
        </div>

        <div id="historyList"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDxRarjAaLRVTkMSnaUdv1NsoZam8b3rlc",
            authDomain: "money-7965b.firebaseapp.com",
            projectId: "money-7965b",
            storageBucket: "money-7965b.firebasestorage.app",
            messagingSenderId: "117194635590",
            appId: "1:117194635590:web:6d911955d6257e16760d47",
            measurementId: "G-Y676HMF04H"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Hàm xử lý mọi kiểu timestamp
        function getDateFromTimestamp(ts) {
            if (!ts) return null;
            if (typeof ts.toDate === 'function') return ts.toDate(); // Firestore Timestamp
            if (typeof ts === 'number') return new Date(ts);         // milliseconds
            if (typeof ts === 'string') return new Date(ts);         // ISO string
            return null;
        }

        function populateYearFilter(snapshot) {
            const selectedYear = $('#filterYear').val();
            const years = new Set();

            snapshot.docs.forEach(doc => {
                const dateObj = getDateFromTimestamp(doc.data().timestamp);
                if (dateObj) years.add(dateObj.getFullYear());
            });

            const $filterYear = $('#filterYear');
            $filterYear.html('<option value="">Tất cả năm</option>');

            [...years].sort((a, b) => b - a).forEach(year => {
                $filterYear.append(`<option value="${year}">${year}</option>`);
            });

            if (selectedYear && years.has(Number(selectedYear))) {
                $filterYear.val(selectedYear);
            }
        }

        // Hàm hiển thị dữ liệu
        function renderHistory(snapshot, yearFilter, monthFilter) {
            $('#historyList').empty();

            const docs = snapshot.docs.filter(doc => {
                if (!yearFilter && !monthFilter) return true;
                const data = doc.data();
                const dateObj = getDateFromTimestamp(data.timestamp);
                if (!dateObj) return false;
                const docYear = String(dateObj.getFullYear());
                const docMonth = String(dateObj.getMonth() + 1).padStart(2, '0');

                return (!yearFilter || docYear === yearFilter) && (!monthFilter || docMonth === monthFilter);
            });

            if (docs.length === 0) {
                $('#historyList').html('<p>Không có dữ liệu cho tháng này.</p>');
                return;
            }

            docs.forEach(doc => {
                const data = doc.data();
                const dateObj = getDateFromTimestamp(data.timestamp);
                const dateStr = dateObj ? dateObj.toLocaleString("vi-VN") : "Không rõ thời gian";

                $('#historyList').append(`
                    <div class="card mb-4">
                        <div class="card-header">🗓️ ${dateStr}</div>
                        <div class="card-body">${data.summaryHTML || ''}</div>
                    </div>
                `);
            });
        }

        // Lấy dữ liệu realtime
        let latestSnapshot = null;
        db.collection("chiaTienResults")
            .orderBy("timestamp", "desc")
            .onSnapshot(snapshot => {
                latestSnapshot = snapshot;
                populateYearFilter(snapshot);
                renderHistory(snapshot, $('#filterYear').val(), $('#filterMonth').val());
            });

        // Lắng nghe thay đổi bộ lọc
        $('#filterYear, #filterMonth').on('change', function() {
            if (latestSnapshot) {
                renderHistory(latestSnapshot, $('#filterYear').val(), $('#filterMonth').val());
            }
        });
    </script>
</body>
</html>
